# ─────────────────────────────────────────────────────────────────────────────
# PostgREST — конфиг для self-host рядом с приложением (ТЗ docs/tz-step4-deployment.md, A2)
# ─────────────────────────────────────────────────────────────────────────────
# ШАБЛОН. Скопировать в /etc/postgrest/postgrest.conf на сервере и подставить
# реальные значения вместо <...>. СЕКРЕТЫ В РЕПО НЕ КОММИТИТЬ.
#
# Версию образа/бинаря закрепить ≥ v12 (как шлюз Supabase) — иначе тонкие
# отличия в эмбедах/агрегатах/!inner. Проверено локально на v14 (надмножество).
#
# ★ РЕАЛЬНО ПРИМЕНЁННЫЙ ВАРИАНТ (22.06.2026) ★ — без суперюзера Timeweb.
# Боевые роли authenticator/web_app (least-privilege) ТРЕБУЮТ суперюзера/панели
# Timeweb (gen_user без CREATEROLE/BYPASSRLS) и остаются опциональным хардненингом
# на потом. Дыру «/rest/v1 открыт наружу» закрывает не разделение ролей, а
# jwt-secret ниже: подключаемся под gen_user (владелец = ведёт себя как
# service_role), но требуем валидный JWT. См. docs/tz-step4-deployment.md A1.
# ─────────────────────────────────────────────────────────────────────────────

# Подключение под gen_user (владелец таблиц, обходит RLS = как нынешний
# service_role). claim role в токене = gen_user → SET ROLE gen_user (= self, ок).
# Timeweb Managed Postgres — отдельный хост с обязательным SSL (как в шаге 1).
db-uri = "postgresql://gen_user:<ПАРОЛЬ_GEN_USER>@<TIMEWEB_PG_HOST>:<PG_PORT>/<DB_NAME>?sslmode=verify-ca&sslrootcert=/etc/postgrest/ca.crt"

# Схема данных. extensions нужна для pgcrypto (gen_random_bytes у токенов).
db-schemas = "public"
db-extra-search-path = "public, extensions"

# db-anon-role НАМЕРЕННО НЕ ЗАДАЁМ → запрос без валидного JWT = 401
# «Anonymous access is disabled». Это и закрывает /rest/v1 наружу.
# (Если позже появятся боевые роли — db-anon-role = "anon" с нулевыми правами.)
# db-anon-role = "web_app"

# ★ jwt-secret ОБЯЗАТЕЛЕН (закрытие двери). Отдельный случайный секрет (≥32 симв.,
# напр. `openssl rand -hex 32`), живёт ТОЛЬКО здесь. supabase-js шлёт его в
# Authorization: Bearer; PostgREST валидирует, читает claim role.
# Приложению в .env.production кладём СЛУЖЕБНЫЙ токен (SUPABASE_SERVICE_ROLE_KEY):
#   HS256, payload {"role":"gen_user"}, подписан этим секретом — server-only.
# ВАЖНО: это НЕ тот же секрет, что JWT_SECRET приложения (вход пользователей) —
# слой PostgREST полностью независим. Anon-ключ (NEXT_PUBLIC_*) к БД не ходит
# (браузер работает только через серверные API-роуты), поэтому пересборка не нужна.
# ⚠ В nginx УБРАТЬ срез Authorization/apikey, иначе токен не доедет (см. nginx-conf).
jwt-secret = "<СЛУЧАЙНЫЙ_СЕКРЕТ_HS256_мин_32_символа>"

# Пул соединений — подобрать под CPU/нагрузку VDS.
db-pool = 10
db-pool-acquisition-timeout = 10

# Слушаем ТОЛЬКО локально. Наружу отдаёт nginx по пути /rest/v1 (см. nginx-yearbook.conf).
server-host = "127.0.0.1"
server-port = 3001

# Лог уровень для эксплуатации.
log-level = "error"

# После каждой миграции схемы — reload кэша схемы PostgREST:
#   NOTIFY pgrst, 'reload schema';
# Это уже зашито в scripts/db-migrate.mjs. Без reload новые колонки → 400/404.
db-channel-enabled = true
db-channel = "pgrst"
