# ─────────────────────────────────────────────────────────────────────────────
# PostgREST — конфиг для self-host рядом с приложением (ТЗ docs/tz-step4-deployment.md, A2)
# ─────────────────────────────────────────────────────────────────────────────
# ШАБЛОН. Скопировать в /etc/postgrest/postgrest.conf на сервере и подставить
# реальные значения вместо <...>. СЕКРЕТЫ В РЕПО НЕ КОММИТИТЬ.
#
# Версию образа/бинаря закрепить ≥ v12 (как шлюз Supabase) — иначе тонкие
# отличия в эмбедах/агрегатах/!inner. Проверено локально на v14 (надмножество).
#
# Применяется после scripts/step4-postgrest-roles.sql (роли authenticator + web_app).
# ─────────────────────────────────────────────────────────────────────────────

# Подключение под технической ролью authenticator. PostgREST через SET ROLE
# переключается на db-anon-role (web_app) для каждого запроса.
# Timeweb Managed Postgres — отдельный хост с обязательным SSL (как в шаге 1).
db-uri = "postgres://authenticator:<ПАРОЛЬ_AUTHENTICATOR>@<TIMEWEB_PG_HOST>:<PG_PORT>/<DB_NAME>?sslmode=verify-ca&sslrootcert=/etc/postgrest/ca.crt"

# Схема данных. extensions нужна для pgcrypto (gen_random_bytes у токенов).
db-schemas = "public"
db-extra-search-path = "public, extensions"

# КЛЮЧЕВОЕ: без валидного JWT PostgREST работает под web_app (= нынешний
# service_role: BYPASSRLS, видит все строки). Авторизация — в коде приложения.
db-anon-role = "web_app"

# jwt-secret НАМЕРЕННО НЕ ЗАДАЁМ. Приложению он не нужен (auth своя, JWT в коде).
# Заголовки apikey/Authorization, которые шлёт supabase-js, PostgREST просто
# игнорирует — и всё идёт под анонимной ролью web_app. Это ожидаемо.
# (Если позже захотим разграничение ролей на стороне БД — включить jwt-secret.)

# Пул соединений — подобрать под CPU/нагрузку VDS.
db-pool = 10
db-pool-acquisition-timeout = 10

# Слушаем ТОЛЬКО локально. Наружу отдаёт nginx по пути /rest/v1 (см. nginx-yearbook.conf).
server-host = "127.0.0.1"
server-port = 3001

# Лог уровень для эксплуатации.
log-level = "error"

# После каждой миграции схемы — reload кэша схемы PostgREST:
#   NOTIFY pgrst, 'reload schema';
# Это уже зашито в scripts/db-migrate.mjs. Без reload новые колонки → 400/404.
db-channel-enabled = true
db-channel = "pgrst"
