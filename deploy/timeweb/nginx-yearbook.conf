# ─────────────────────────────────────────────────────────────────────────────
# nginx — фронт для приложения + внутренний путь /rest/v1 к PostgREST
# (ТЗ docs/tz-step4-deployment.md, A3 + B2)
# ─────────────────────────────────────────────────────────────────────────────
# ШАБЛОН. Скопировать в /etc/nginx/sites-available/yearbook и подставить <...>.
# Подключить: ln -s ../sites-available/yearbook /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
#
# HTTPS-сертификат выпускает certbot (см. README, B2). Блок ниже — итоговый,
# после certbot (он сам добавит ssl_certificate*). Для первого выпуска оставить
# 80-й порт с ACME-challenge, затем certbot --nginx.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name <DOMAIN>;            # напр. app.example.ru

    # ── certbot подставит эти строки автоматически (--nginx) ──
    # ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    client_max_body_size 25m;        # IDML/фоны грузятся presigned-ом мимо сервера,
                                     # но запас на формы/JSON.

    # ── PostgREST: то, что Supabase отдавал по <URL>/rest/v1/... ──────────────
    # supabase-js ходит на NEXT_PUBLIC_SUPABASE_URL + "/rest/v1/...". Отдаём это
    # локальному PostgREST, СРЕЗАЯ префикс /rest/v1 (trailing slash в proxy_pass).
    # БД остаётся server-only (PostgREST слушает 127.0.0.1); наружу путь открыт,
    # но теперь защищён JWT (см. ниже) — без валидного токена PostgREST = 401.
    location /rest/v1/ {
        proxy_pass http://127.0.0.1:3001/;   # ВАЖЕН trailing slash — срезает /rest/v1
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PostgREST принимает Prefer/Range/Accept-Profile от supabase-js как есть.
        proxy_pass_request_headers on;
        # ✅ ДВЕРЬ ЗАКРЫТА (22.06.2026): Authorization НЕ срезаем — supabase-js шлёт
        # Bearer со служебным токеном, PostgREST его валидирует (jwt-secret задан,
        # см. postgrest.conf). Запрос без валидного токена → 401 «Anonymous access
        # is disabled». Прежний срез заголовка УБРАН (он и делал /rest/v1 открытым
        # наружу как привилегированную роль). НЕ возвращать строки ниже:
        #   proxy_set_header Authorization "";   ← НЕ добавлять (сломает auth)
        #   proxy_set_header apikey "";          ← НЕ добавлять
    }

    # ── Next.js приложение (всё остальное) ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;    # Next слушает локально (см. systemd)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;             # запас под тяжёлый PDF-экспорт/очередь
    }
}

# HTTP → HTTPS редирект (certbot обычно создаёт сам).
server {
    listen 80;
    server_name <DOMAIN>;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
