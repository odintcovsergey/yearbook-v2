name: Daily Backup

# ВНИМАНИЕ: раннеры GitHub (за границей) НЕ доходят до базы Timeweb в РФ
# (TCP 5432 timeout — проверено 2026-06-23). Поэтому ночной бэкап перенесён
# НА САМ СЕРВЕР (VDS 5.129.221.197): systemd-таймер yearbook-backup.timer,
# дамп уходит off-site по SSH deploy-key в репозиторий yearbook-backups.
# Здесь ночное расписание ОТКЛЮЧЕНО — оставлен только ручной запуск
# (на случай, если когда-нибудь база станет доступна снаружи).
on:
  workflow_dispatch:
    inputs:
      run_storage:
        description: 'Включить бэкап Storage (yes/no)'
        required: false
        default: 'no'

jobs:
  # ─────────────────────────────────────────────
  # Бэкап БД (Timeweb managed Postgres) — ежедневно
  # ─────────────────────────────────────────────
  backup-database:
    name: PostgreSQL dump
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 3 * * *'

    steps:
      - name: Install postgresql-client 18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18

      # Проба связи: достаёт ли раннер GitHub до РФ-базы Timeweb.
      # Если упрётся в сетевой фильтр — упадёт здесь с понятным сообщением,
      # и тогда переходим на бэкап с самого сервера (он до базы ходит).
      - name: Check connectivity to Timeweb DB
        env:
          DB_URL: ${{ secrets.TIMEWEB_DATABASE_URL }}
          PGSSLMODE: require
          PGCONNECT_TIMEOUT: '15'
        run: |
          echo "Проверяю доступ к базе Timeweb из GitHub Actions…"
          if /usr/lib/postgresql/18/bin/psql "$DB_URL" -tAc "select 'ok', version();"; then
            echo "✅ База Timeweb доступна из GitHub Actions."
          else
            echo "❌ GitHub Actions НЕ дошёл до базы Timeweb (сетевой фильтр/таймаут)."
            echo "   Переходим на запасной вариант — бэкап с самого сервера по расписанию."
            exit 1
          fi

      - name: Dump database
        env:
          DB_URL: ${{ secrets.TIMEWEB_DATABASE_URL }}
          PGSSLMODE: require
          PGCONNECT_TIMEOUT: '15'
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p dump
          /usr/lib/postgresql/18/bin/pg_dump \
            "$DB_URL" \
            --no-owner --no-acl \
            --schema=public \
            -Fc \
            -f "dump/db-${DATE}.dump"
          echo "Dump size: $(du -sh dump/db-${DATE}.dump | cut -f1)"

      - name: Push to yearbook-backups
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          git clone https://odintcovsergey:${BACKUP_TOKEN}@github.com/odintcovsergey/yearbook-backups.git backup-repo
          cd backup-repo
          git config user.email "backup@yearbook.app"
          git config user.name "Backup Bot"
          mkdir -p database
          cp "../dump/db-${DATE}.dump" "database/db-${DATE}.dump"
          find database/ -name "db-*.dump" -mtime +30 -delete
          git add -A
          git commit -m "backup: db ${DATE}" || echo "Nothing new"
          git push

  # ─────────────────────────────────────────────
  # Опись файлов Storage (Timeweb S3) — еженедельно
  # ─────────────────────────────────────────────
  backup-storage:
    name: Storage file inventory
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 4 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_storage == 'yes')

    steps:
      - name: List Timeweb S3 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TWC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TWC_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.TWC_S3_REGION }}
          S3_ENDPOINT: ${{ secrets.TWC_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.TWC_S3_BUCKET }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p storage-meta
          # Полная опись (с пагинацией) — путь, размер, дата каждого объекта.
          aws s3 ls "s3://${S3_BUCKET}" --recursive \
            --endpoint-url "${S3_ENDPOINT}" \
            > "storage-meta/files-${DATE}.txt"
          echo "Files listed: $(wc -l < storage-meta/files-${DATE}.txt)"
          echo "Total size: $(awk '{s+=$3} END {printf "%.1f MB\n", s/1048576}' storage-meta/files-${DATE}.txt)"

      - name: Push to yearbook-backups
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          git clone https://odintcovsergey:${BACKUP_TOKEN}@github.com/odintcovsergey/yearbook-backups.git backup-repo
          cd backup-repo
          git config user.email "backup@yearbook.app"
          git config user.name "Backup Bot"
          mkdir -p storage
          cp "../storage-meta/files-${DATE}.txt" "storage/files-${DATE}.txt"
          find storage/ -name "files-*.txt" -mtime +28 -delete
          git add -A
          git commit -m "backup: storage inventory ${DATE}" || echo "Nothing new"
          git push
